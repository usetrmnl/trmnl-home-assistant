port 0

maxmemory 128mb
maxmemory-policy noeviction

appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 32mb
aof-use-rdb-preamble yes

save ""

shutdown-timeout 10

loglevel notice

daemonize no
supervised no
pidfile ""
databases 16
